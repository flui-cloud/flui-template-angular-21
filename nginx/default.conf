server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # ^~ keeps this prefix above the regex blocks below — without it the
    # generic file-type regex wins by nginx location priority rules.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location ~* \.[0-9a-f]{8,}\.(?:js|css|woff2?)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
